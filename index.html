<!doctype html>
<html lang="en">
  <head>
    <title>Monkey Puppet Gesture Interaction | XR Blocks</title>

    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, user-scalable=no"
    />
    <link type="text/css" rel="stylesheet" href="https://xrblocks.github.io/css/xr.css" />
    <script>
      window.litDisableBundleWarning = true;
    </script>
    <script type="importmap">
      {
        "imports": {
          "three": "https://cdn.jsdelivr.net/npm/three@0.182.0/build/three.module.js",
          "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.182.0/examples/jsm/",
          "troika-three-text": "https://cdn.jsdelivr.net/gh/protectwise/troika@028b81cf308f0f22e5aa8e78196be56ec1997af5/packages/troika-three-text/src/index.js",
          "troika-three-utils": "https://cdn.jsdelivr.net/gh/protectwise/troika@v0.52.4/packages/troika-three-utils/src/index.js",
          "troika-worker-utils": "https://cdn.jsdelivr.net/gh/protectwise/troika@v0.52.4/packages/troika-worker-utils/src/index.js",
          "bidi-js": "https://esm.sh/bidi-js@%5E1.0.2?target=es2022",
          "webgl-sdf-generator": "https://esm.sh/webgl-sdf-generator@1.1.1/es2022/webgl-sdf-generator.mjs",
          "lit": "https://cdn.jsdelivr.net/gh/lit/dist@3/core/lit-core.min.js",
          "lit/": "https://esm.run/lit@3/",
          "xrblocks": "https://cdn.jsdelivr.net/npm/xrblocks@0.11.0/build/xrblocks.js",
          "xrblocks/addons/": "https://cdn.jsdelivr.net/npm/xrblocks@0.11.0/build/addons/",
          "@google/genai": "https://cdn.jsdelivr.net/npm/@google/genai/+esm"
        }
      }
    </script>
  </head>

  <body>
    <!-- 用于在头显中显示潜在错误信息的浮层 -->
    <div id="debug-log" style="position: absolute; top: 10px; left: 10px; color: red; z-index: 9999; font-weight: bold; background: rgba(255,255,255,0.8); padding: 5px; display: none;"></div>
    
    <script type="module">
      import 'xrblocks/addons/simulator/SimulatorAddons.js';
      import * as THREE from 'three';
      import * as xb from 'xrblocks';

      /**
       * PuppetMonkeyInteraction 演示了基于手势追踪的交互。
       * 猴子模型会吸附在用户的手腕上，并根据食指和拇指的捏合距离（Pinch）来张嘴和挥舞手臂。
       */
      class PuppetMonkeyInteraction extends xb.Script {
        init() {
          // 添加基础环境光照
          this.add(new THREE.HemisphereLight(0xffffff, 0x666666, 3));
          const dirLight = new THREE.DirectionalLight(0xffffff, 1.5);
          dirLight.position.set(1, 2, 1);
          this.add(dirLight);

          // 创建空间提示面板
          const panel = new xb.SpatialPanel({ backgroundColor: '#2b2b2baa' });
          panel.position.set(0, 1.5, -1.5);
          this.add(panel);

          const grid = panel.addGrid();
          grid.addRow({ weight: 0.5 }).addText({
            text: '🐒 木偶小猴子！\n把手举到视野中。\n捏合手指来控制它张嘴！',
            fontColor: '#ffffff',
            fontSize: 0.06
          });

          // 新增：AI 交互区域
          const aiRow = grid.addRow({ weight: 0.25 });
          const aiButton = aiRow.addCol({ weight: 0.5 }).addTextButton({
            text: '✨ 让小猴子看看',
            fontColor: '#ffffff',
            backgroundColor: '#4285f4',
            fontSize: 0.05
          });
          aiButton.onTriggered = () => this.askMonkey();

          this.responseDisplay = grid.addRow({ weight: 0.25 }).addText({
            text: '点击上方按钮，小猴子会告诉你它看到了什么！',
            fontColor: '#ffeb3b',
            fontSize: 0.04
          });

          // 程序化生成猴子模型
          this.createMonkey();
        }

        /**
         * 使用 THREE.js 基础几何体拼接出一个简易猴子
         */
        createMonkey() {
          this.monkey = new THREE.Group();
          
          const brownMaterial = new THREE.MeshPhongMaterial({ color: 0x8B4513 });
          const lightBrownMaterial = new THREE.MeshPhongMaterial({ color: 0xD2B48C });
          const blackMaterial = new THREE.MeshPhongMaterial({ color: 0x000000 });

          // 头部
          const head = new THREE.Mesh(new THREE.SphereGeometry(0.06, 32, 32), brownMaterial);
          head.position.set(0, 0.08, 0);
          this.monkey.add(head);

          // 嘴突部 (Snout)
          const snout = new THREE.Mesh(new THREE.SphereGeometry(0.035, 32, 32), lightBrownMaterial);
          snout.position.set(0, 0.06, 0.05);
          this.monkey.add(snout);

          // 眼睛
          const eyeGeom = new THREE.SphereGeometry(0.01, 16, 16);
          const leftEye = new THREE.Mesh(eyeGeom, blackMaterial);
          leftEye.position.set(-0.025, 0.1, 0.05);
          this.monkey.add(leftEye);
          const rightEye = new THREE.Mesh(eyeGeom, blackMaterial);
          rightEye.position.set(0.025, 0.1, 0.05);
          this.monkey.add(rightEye);

          // 耳朵
          const earGeom = new THREE.SphereGeometry(0.025, 16, 16);
          const leftEar = new THREE.Mesh(earGeom, brownMaterial);
          leftEar.position.set(-0.06, 0.08, 0);
          this.monkey.add(leftEar);
          const rightEar = new THREE.Mesh(earGeom, brownMaterial);
          rightEar.position.set(0.06, 0.08, 0);
          this.monkey.add(rightEar);

          // 身体
          const body = new THREE.Mesh(new THREE.CylinderGeometry(0.04, 0.05, 0.08, 16), brownMaterial);
          body.position.set(0, 0.02, 0);
          this.monkey.add(body);

          // 左臂枢纽 (用于旋转)
          this.leftArmPivot = new THREE.Group();
          this.leftArmPivot.position.set(-0.05, 0.05, 0);
          const leftArm = new THREE.Mesh(new THREE.CylinderGeometry(0.015, 0.012, 0.08), brownMaterial);
          leftArm.position.set(0, -0.04, 0); 
          this.leftArmPivot.add(leftArm);
          this.monkey.add(this.leftArmPivot);

          // 右臂枢纽
          this.rightArmPivot = new THREE.Group();
          this.rightArmPivot.position.set(0.05, 0.05, 0);
          const rightArm = new THREE.Mesh(new THREE.CylinderGeometry(0.015, 0.012, 0.08), brownMaterial);
          rightArm.position.set(0, -0.04, 0);
          this.rightArmPivot.add(rightArm);
          this.monkey.add(this.rightArmPivot);

          // 嘴巴 (根据捏合距离缩放)
          this.mouth = new THREE.Mesh(new THREE.SphereGeometry(0.015, 16, 16), blackMaterial);
          this.mouth.position.set(0, 0.045, 0.075);
          this.mouth.scale.set(1, 0.1, 1); // 默认闭合
          this.monkey.add(this.mouth);

          // 在识别到手之前，先放置在视野正前方
          this.monkey.position.set(0, 1.2, -1.0);
          this.add(this.monkey);
        }

        /**
         * 调用 Gemini API 获取视觉分析，并让猴子"开口说话"
         */
        async askMonkey() {
          const ai = xb.core.ai;
          const camera = xb.core.deviceCamera;
          if (!ai || !ai.isAvailable()) {
            this.responseDisplay.setText('AI未就绪，请在环境中配置API Key。');
            return;
          }
          this.responseDisplay.setText('小猴子正在东张西望...');

          try {
            const parts = [];
            let sawSomething = false;

            // 如果设备相机可用，尝试抓取一帧画面
            if (camera) {
              try {
                const snapshot = camera.getSnapshot({outputFormat: 'base64'});
                if (snapshot) {
                  const {strippedBase64, mimeType} = xb.parseBase64DataURL(snapshot);
                  parts.push({inlineData: {mimeType: mimeType, data: strippedBase64}});
                  sawSomething = true;
                }
              } catch (e) {
                console.warn("无法获取相机画面", e);
              }
            }

            if (sawSomething) {
              parts.push({text: '你是一只调皮的木偶小猴子。请用幽默、可爱的语气（用"吱吱！"开头）用中文描述你在这张照片里看到了什么？如果没看到明显的物体，就随机讲个关于香蕉的冷笑话。控制在两句话以内。'});
            } else {
              // 针对 Pico 等无法获取相机画面的设备的 Fallback 提示词
              parts.push({text: '你是一只调皮的木偶小猴子。因为当前设备(如Pico)未开放网页相机权限，你看不到外面。请用"吱吱！"开头，幽默地吐槽一下你被蒙住了眼睛，然后讲个关于香蕉的冷笑话。控制在两句话内。'});
            }

            const response = await ai.query({
              type: 'multiPart',
              parts: parts,
            });
            this.responseDisplay.setText(`🐒: ${response.text}`);
            
            // 触发猴子自动张嘴说话的动画效果
            this.isMonkeyTalking = true;
            this.talkStartTime = performance.now();
            setTimeout(() => { this.isMonkeyTalking = false; }, 4000);

          } catch (error) {
            this.responseDisplay.setText(`错误: ${error.message}`);
          }
        }

        /**
         * 渲染循环：实时追踪手部关节位置并更新木偶状态
         */
        update() {
          const handsData = xb.user.hands;
          
          if (handsData && handsData.hands && handsData.hands.length > 0) {
            // 优先使用右手，如果没有则使用左手
            const puppetHand = handsData.hands.find(h => h.handedness === 'right') || handsData.hands[0];
            const joints = puppetHand.joints;

            if (joints['wrist'] && joints['index-finger-tip'] && joints['thumb-tip']) {
              // 1. 将猴子位置绑定到手腕
              this.monkey.position.copy(joints['wrist'].position);
              this.monkey.quaternion.copy(joints['wrist'].quaternion);
              
              // 旋转猴子，使其在手背/手腕上直立
              this.monkey.rotateX(-Math.PI / 2);
              this.monkey.translateY(0.05);

              // 2. 计算大拇指指尖和食指指尖的距离
              const thumbTip = joints['thumb-tip'].position;
              const indexTip = joints['index-finger-tip'].position;
              const pinchDistance = thumbTip.distanceTo(indexTip);

              // 将距离映射到 0.0 到 1.0 的张开比例 (大致 2cm 到 8cm 之间)
              const openRatio = Math.max(0, Math.min(1, (pinchDistance - 0.02) / 0.06));

              // 结合 AI 说话状态计算最终的张口大小
              let finalOpenRatio = openRatio;
              if (this.isMonkeyTalking) {
                const time = (performance.now() - this.talkStartTime) / 100;
                // 用正弦波模拟快速开合嘴巴的说话动作
                finalOpenRatio = Math.max(openRatio, (Math.sin(time) + 1) / 2);
              }

              // 动画：手臂向上挥舞
              const maxArmAngle = Math.PI * 0.7;
              this.leftArmPivot.rotation.z = -openRatio * maxArmAngle;
              this.rightArmPivot.rotation.z = openRatio * maxArmAngle;

              // 动画：嘴巴张开
              this.mouth.scale.set(1, 0.1 + (finalOpenRatio * 1.5), 1);
            }
          } else {
            // 手部丢失时恢复默认状态
            this.leftArmPivot.rotation.z = 0;
            this.rightArmPivot.rotation.z = 0;
            
            // 即使没有追踪到手，只要小猴子在说话，也让它张嘴
            let idleOpenRatio = 0;
            if (this.isMonkeyTalking) {
              const time = (performance.now() - this.talkStartTime) / 100;
              idleOpenRatio = (Math.sin(time) + 1) / 2;
            }
            this.mouth.scale.set(1, 0.1 + (idleOpenRatio * 1.5), 1);
          }
        }
      }

      async function start() {
        try {
          // 在初始化前，先检测设备是否有可用的摄像头硬件
          let hasVideoInput = false;
          if (navigator.mediaDevices && navigator.mediaDevices.enumerateDevices) {
            const devices = await navigator.mediaDevices.enumerateDevices();
            hasVideoInput = devices.some(device => device.kind === 'videoinput');
          }

          // ============================================================
          // 关键修复 3：拦截 navigator.xr.requestSession，
          // 将 hand-tracking 从 requiredFeatures 移到 optionalFeatures
          // ============================================================
          // xrblocks 的 Core.init() 内部会在 hands.enabled=true 时
          // 自动将 "hand-tracking" 添加到 requiredFeatures。
          // 但 Pico 4 浏览器可能不支持 hand-tracking 作为 requiredFeature，
          // 这会导致整个 XR session 创建失败（页面"没有反应"的根本原因之一）。
          // 我们在框架层之下拦截 requestSession 调用，
          // 将 hand-tracking 降级为 optionalFeature，这样即使设备不支持手部追踪，
          // VR session 仍然可以正常创建，应用不会崩溃。
          if (navigator.xr && navigator.xr.requestSession) {
            const originalRequestSession = navigator.xr.requestSession.bind(navigator.xr);
            navigator.xr.requestSession = async function(mode, options = {}) {
              const requiredFeatures = options.requiredFeatures || [];
              const optionalFeatures = options.optionalFeatures || [];

              // 将 hand-tracking 从 required 移到 optional
              const handTrackingIdx = requiredFeatures.indexOf('hand-tracking');
              if (handTrackingIdx !== -1) {
                requiredFeatures.splice(handTrackingIdx, 1);
                if (!optionalFeatures.includes('hand-tracking')) {
                  optionalFeatures.push('hand-tracking');
                }
                console.log('[Pico4 Fix] hand-tracking moved from requiredFeatures to optionalFeatures');
              }

              // 将 depth-sensing 也移到 optional（Pico 4 可能不支持）
              const depthIdx = requiredFeatures.indexOf('depth-sensing');
              if (depthIdx !== -1) {
                requiredFeatures.splice(depthIdx, 1);
                if (!optionalFeatures.includes('depth-sensing')) {
                  optionalFeatures.push('depth-sensing');
                }
                console.log('[Pico4 Fix] depth-sensing moved from requiredFeatures to optionalFeatures');
              }

              return originalRequestSession(mode, {
                ...options,
                requiredFeatures,
                optionalFeatures
              });
            };
          }

          const options = new xb.Options();
          
          // 必须开启 UI 模块，SpatialPanel 才能正常工作
          options.enableUI(); 

          // 启用 AI
          options.enableAI();
          
          // 仅在检测到物理摄像头时开启相机模块，防止在 Pico 等头显上因无相机而导致 "Hardware not found" 崩溃
          if (hasVideoInput) {
            options.enableCamera(); 
          }
          
          // ============================================================
          // 关键修复 1：重新启用 XR Transitions 以提供 "Enter VR" 入口
          // ============================================================
          // 之前注释掉 enableXRTransitions() 是导致 Pico 4 无法进入 VR 的根本原因！
          // 没有它，页面上不会渲染 "Enter VR" 按钮，用户点击后没有任何反应。
          options.enableXRTransitions();

          // ============================================================
          // 关键修复 2：设置 VR 模式（而非默认的 AR 模式）
          // ============================================================
          // Pico 4 是纯 VR 头显，不支持 immersive-ar 模式。
          // xrblocks 默认 xrSessionMode 为 'immersive-ar'，
          // 必须改为 'immersive-vr'，否则 requestSession('immersive-ar') 会抛出
          // "Requested mode is not supported" 错误。
          options.enableVR();

          // 启用手势追踪
          // 即使 Pico 4 不支持 hand-tracking 作为 requiredFeature，
          // 上面我们已经通过拦截 requestSession 将其降级为 optionalFeature，
          // 所以这里仍然可以安全地启用。
          options.enableHands();
          options.hands.enabled = true;
          options.hands.visualization = true;

          options.simulator.defaultMode = xb.SimulatorMode.POSE;
          
          xb.add(new PuppetMonkeyInteraction());
          await xb.init(options);
        } catch (error) {
          // 如果依然失败，会在屏幕左上角打印红色错误信息，方便我们定位问题
          const logDiv = document.getElementById('debug-log');
          logDiv.style.display = 'block';
          logDiv.innerText = '初始化失败: ' + error.message + '\n\nStack: ' + (error.stack || '');
          console.error(error);
        }
      }

      document.addEventListener('DOMContentLoaded', start);
    </script>
  </body>
</html>

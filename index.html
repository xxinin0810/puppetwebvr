<!doctype html>
<html lang="en">
  <head>
    <title>Monkey Puppet - Controller Interaction</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <link type="text/css" rel="stylesheet" href="https://xrblocks.github.io/css/xr.css" />
    <script>
      window.litDisableBundleWarning = true;
    </script>
    <script type="importmap">
      {
        "imports": {
          "three": "https://cdn.jsdelivr.net/npm/three@0.182.0/build/three.module.js",
          "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.182.0/examples/jsm/",
          "troika-three-text": "https://cdn.jsdelivr.net/gh/protectwise/troika@028b81cf308f0f22e5aa8e78196be56ec1997af5/packages/troika-three-text/src/index.js",
          "troika-three-utils": "https://cdn.jsdelivr.net/gh/protectwise/troika@v0.52.4/packages/troika-three-utils/src/index.js",
          "troika-worker-utils": "https://cdn.jsdelivr.net/gh/protectwise/troika@v0.52.4/packages/troika-worker-utils/src/index.js",
          "bidi-js": "https://esm.sh/bidi-js@%5E1.0.2?target=es2022",
          "webgl-sdf-generator": "https://esm.sh/webgl-sdf-generator@1.1.1/es2022/webgl-sdf-generator.mjs",
          "lit": "https://cdn.jsdelivr.net/gh/lit/dist@3/core/lit-core.min.js",
          "lit/": "https://esm.run/lit@3/",
          "xrblocks": "https://cdn.jsdelivr.net/npm/xrblocks@0.11.0/build/xrblocks.js",
          "xrblocks/addons/": "https://cdn.jsdelivr.net/npm/xrblocks@0.11.0/build/addons/",
          "@google/genai": "https://cdn.jsdelivr.net/npm/@google/genai/+esm"
        }
      }
    </script>
  </head>

  <body>
    <div id="debug-log" style="position: absolute; top: 10px; left: 10px; color: red; z-index: 9999; font-weight: bold; background: rgba(255,255,255,0.8); padding: 5px; display: none;"></div>
    
    <script type="module">
      import 'xrblocks/addons/simulator/SimulatorAddons.js';
      import * as THREE from 'three';
      import * as xb from 'xrblocks';

      /**
       * PuppetMonkeyInteraction - 牵线木偶交互
       * 使用 Three.js 官方的拖拽方案：
       * - 手柄射线检测牵引环
       * - 按扳机键抓取：controller.attach(ring)
       * - 释放：group.attach(ring)
       * - 牵引环移动时，通过控制线拉动木偶部位
       */
      class PuppetMonkeyInteraction extends xb.Script {
        init() {
          // 添加基础环境光照
          this.add(new THREE.HemisphereLight(0xffffff, 0x666666, 3));
          const dirLight = new THREE.DirectionalLight(0xffffff, 1.5);
          dirLight.position.set(1, 2, 1);
          this.add(dirLight);

          // 创建空间提示面板
          const panel = new xb.SpatialPanel({ backgroundColor: '#2b2b2baa' });
          panel.position.set(0, 1.5, -1.5);
          this.add(panel);

          const grid = panel.addGrid();
          grid.addRow({ weight: 0.5 }).addText({
            text: '🐒 牵线木偶小猴子！\n\n用手柄射线瞄准牵引环\n按扳机键抓取并移动\n牵引猴子做动作！',
            fontColor: '#ffffff',
            fontSize: 0.05
          });

          // AI 交互按钮
          const aiRow = grid.addRow({ weight: 0.25 });
          const aiButton = aiRow.addCol({ weight: 0.5 }).addTextButton({
            text: '✨ 让小猴子看看',
            fontColor: '#ffffff',
            backgroundColor: '#4285f4',
            fontSize: 0.05
          });
          aiButton.onTriggered = () => this.askMonkey();

          this.responseDisplay = grid.addRow({ weight: 0.25 }).addText({
            text: '点击上方按钮，小猴子会告诉你它看到了什么！',
            fontColor: '#ffeb3b',
            fontSize: 0.04
          });

          // 创建木偶和控制器
          this.createPuppetMonkey();
          this.createControlRings();
          
          // 初始化控制器交互（使用 Three.js 官方方案）
          this.setupControllerInteraction();
        }

        /**
         * 创建牵线木偶猴子
         */
        createPuppetMonkey() {
          this.puppetGroup = new THREE.Group();
          
          const brown = new THREE.MeshPhongMaterial({ color: 0x8B4513 });
          const lightBrown = new THREE.MeshPhongMaterial({ color: 0xD2B48C });
          const black = new THREE.MeshPhongMaterial({ color: 0x000000 });

          // ========== 头部 ==========
          this.headPivot = new THREE.Group();
          this.headPivot.position.set(0, 0.25, 0);
          
          const head = new THREE.Mesh(new THREE.SphereGeometry(0.08, 32, 32), brown);
          head.position.set(0, 0.08, 0);
          this.headPivot.add(head);

          const snout = new THREE.Mesh(new THREE.SphereGeometry(0.045, 32, 32), lightBrown);
          snout.position.set(0, 0.05, 0.06);
          snout.scale.set(1, 0.7, 1.2);
          this.headPivot.add(snout);

          const eyeGeom = new THREE.SphereGeometry(0.012, 16, 16);
          const leftEye = new THREE.Mesh(eyeGeom, black);
          leftEye.position.set(-0.03, 0.1, 0.06);
          this.headPivot.add(leftEye);
          const rightEye = new THREE.Mesh(eyeGeom, black);
          rightEye.position.set(0.03, 0.1, 0.06);
          this.headPivot.add(rightEye);

          const earGeom = new THREE.SphereGeometry(0.03, 16, 16);
          const leftEar = new THREE.Mesh(earGeom, brown);
          leftEar.position.set(-0.08, 0.08, 0);
          leftEar.scale.set(0.5, 1, 1);
          this.headPivot.add(leftEar);
          const rightEar = new THREE.Mesh(earGeom, brown);
          rightEar.position.set(0.08, 0.08, 0);
          rightEar.scale.set(0.5, 1, 1);
          this.headPivot.add(rightEar);

          this.mouth = new THREE.Mesh(new THREE.SphereGeometry(0.02, 16, 16), black);
          this.mouth.position.set(0, 0.04, 0.09);
          this.mouth.scale.set(1, 0.1, 1);
          this.headPivot.add(this.mouth);

          this.puppetGroup.add(this.headPivot);

          // ========== 躯干 ==========
          const torso = new THREE.Mesh(new THREE.CylinderGeometry(0.06, 0.07, 0.15, 16), brown);
          torso.position.set(0, 0.1, 0);
          this.puppetGroup.add(torso);

          // ========== 左臂 ==========
          this.leftShoulderPivot = new THREE.Group();
          this.leftShoulderPivot.position.set(-0.08, 0.15, 0);
          
          const leftUpperArm = new THREE.Mesh(new THREE.CylinderGeometry(0.025, 0.02, 0.12, 12), brown);
          leftUpperArm.position.set(0, -0.06, 0);
          this.leftShoulderPivot.add(leftUpperArm);

          this.leftElbowPivot = new THREE.Group();
          this.leftElbowPivot.position.set(0, -0.12, 0);
          
          const leftForearm = new THREE.Mesh(new THREE.CylinderGeometry(0.018, 0.015, 0.1, 12), brown);
          leftForearm.position.set(0, -0.05, 0);
          this.leftElbowPivot.add(leftForearm);

          this.leftHandPivot = new THREE.Group();
          this.leftHandPivot.position.set(0, -0.1, 0);
          const leftHand = new THREE.Mesh(new THREE.SphereGeometry(0.025, 12, 12), lightBrown);
          this.leftHandPivot.add(leftHand);
          
          this.leftElbowPivot.add(this.leftHandPivot);
          this.leftShoulderPivot.add(this.leftElbowPivot);
          this.puppetGroup.add(this.leftShoulderPivot);

          // ========== 右臂 ==========
          this.rightShoulderPivot = new THREE.Group();
          this.rightShoulderPivot.position.set(0.08, 0.15, 0);
          
          const rightUpperArm = new THREE.Mesh(new THREE.CylinderGeometry(0.025, 0.02, 0.12, 12), brown);
          rightUpperArm.position.set(0, -0.06, 0);
          this.rightShoulderPivot.add(rightUpperArm);

          this.rightElbowPivot = new THREE.Group();
          this.rightElbowPivot.position.set(0, -0.12, 0);
          
          const rightForearm = new THREE.Mesh(new THREE.CylinderGeometry(0.018, 0.015, 0.1, 12), brown);
          rightForearm.position.set(0, -0.05, 0);
          this.rightElbowPivot.add(rightForearm);

          this.rightHandPivot = new THREE.Group();
          this.rightHandPivot.position.set(0, -0.1, 0);
          const rightHand = new THREE.Mesh(new THREE.SphereGeometry(0.025, 12, 12), lightBrown);
          this.rightHandPivot.add(rightHand);
          
          this.rightElbowPivot.add(this.rightHandPivot);
          this.rightShoulderPivot.add(this.rightElbowPivot);
          this.puppetGroup.add(this.rightShoulderPivot);

          // ========== 左腿 ==========
          this.leftHipPivot = new THREE.Group();
          this.leftHipPivot.position.set(-0.04, 0.0, 0);
          
          const leftThigh = new THREE.Mesh(new THREE.CylinderGeometry(0.03, 0.025, 0.14, 12), brown);
          leftThigh.position.set(0, -0.07, 0);
          this.leftHipPivot.add(leftThigh);

          this.leftKneePivot = new THREE.Group();
          this.leftKneePivot.position.set(0, -0.14, 0);
          
          const leftCalf = new THREE.Mesh(new THREE.CylinderGeometry(0.02, 0.015, 0.12, 12), brown);
          leftCalf.position.set(0, -0.06, 0);
          this.leftKneePivot.add(leftCalf);

          this.leftFootPivot = new THREE.Group();
          this.leftFootPivot.position.set(0, -0.12, 0);
          const leftFoot = new THREE.Mesh(new THREE.BoxGeometry(0.03, 0.02, 0.06), brown);
          leftFoot.position.set(0, -0.01, 0.02);
          this.leftFootPivot.add(leftFoot);
          
          this.leftKneePivot.add(this.leftFootPivot);
          this.leftHipPivot.add(this.leftKneePivot);
          this.puppetGroup.add(this.leftHipPivot);

          // ========== 右腿 ==========
          this.rightHipPivot = new THREE.Group();
          this.rightHipPivot.position.set(0.04, 0.0, 0);
          
          const rightThigh = new THREE.Mesh(new THREE.CylinderGeometry(0.03, 0.025, 0.14, 12), brown);
          rightThigh.position.set(0, -0.07, 0);
          this.rightHipPivot.add(rightThigh);

          this.rightKneePivot = new THREE.Group();
          this.rightKneePivot.position.set(0, -0.14, 0);
          
          const rightCalf = new THREE.Mesh(new THREE.CylinderGeometry(0.02, 0.015, 0.12, 12), brown);
          rightCalf.position.set(0, -0.06, 0);
          this.rightKneePivot.add(rightCalf);

          this.rightFootPivot = new THREE.Group();
          this.rightFootPivot.position.set(0, -0.12, 0);
          const rightFoot = new THREE.Mesh(new THREE.BoxGeometry(0.03, 0.02, 0.06), brown);
          rightFoot.position.set(0, -0.01, 0.02);
          this.rightFootPivot.add(rightFoot);
          
          this.rightKneePivot.add(this.rightFootPivot);
          this.rightHipPivot.add(this.rightKneePivot);
          this.puppetGroup.add(this.rightHipPivot);

          // 设置木偶位置
          this.puppetGroup.position.set(0, 1.2, -1.0);
          this.add(this.puppetGroup);
        }

        /**
         * 创建牵引环（可被抓取的物体）
         */
        createControlRings() {
          // 牵引环组（用于 attach/detach）
          this.ringsGroup = new THREE.Group();
          this.add(this.ringsGroup);

          const ringMaterial = new THREE.MeshPhongMaterial({ 
            color: 0xffd700,
            emissive: 0x442200
          });

          const createRing = () => {
            const ringGeom = new THREE.TorusGeometry(0.04, 0.008, 16, 32);
            const ring = new THREE.Mesh(ringGeom, ringMaterial);
            ring.userData.isGrabbable = true; // 标记为可抓取
            return ring;
          };

          // 创建 5 个牵引环
          this.headRing = createRing();
          this.headRing.position.set(0, 1.6, -1.0);
          this.headRing.userData.targetPart = 'head';
          this.ringsGroup.add(this.headRing);

          this.leftHandRing = createRing();
          this.leftHandRing.position.set(-0.3, 1.4, -1.0);
          this.leftHandRing.userData.targetPart = 'leftHand';
          this.ringsGroup.add(this.leftHandRing);

          this.rightHandRing = createRing();
          this.rightHandRing.position.set(0.3, 1.4, -1.0);
          this.rightHandRing.userData.targetPart = 'rightHand';
          this.ringsGroup.add(this.rightHandRing);

          this.leftFootRing = createRing();
          this.leftFootRing.position.set(-0.15, 0.8, -1.0);
          this.leftFootRing.userData.targetPart = 'leftFoot';
          this.ringsGroup.add(this.leftFootRing);

          this.rightFootRing = createRing();
          this.rightFootRing.position.set(0.15, 0.8, -1.0);
          this.rightFootRing.userData.targetPart = 'rightFoot';
          this.ringsGroup.add(this.rightFootRing);

          // 创建控制线
          this.controlLines = [];
          const lineMaterial = new THREE.LineBasicMaterial({ 
            color: 0xffffff,
            transparent: true,
            opacity: 0.6
          });

          const rings = [this.headRing, this.leftHandRing, this.rightHandRing, this.leftFootRing, this.rightFootRing];
          const targets = [this.headPivot, this.leftHandPivot, this.rightHandPivot, this.leftFootPivot, this.rightFootPivot];

          rings.forEach((ring, i) => {
            const geometry = new THREE.BufferGeometry();
            const positions = new Float32Array(6);
            geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
            
            const line = new THREE.Line(geometry, lineMaterial);
            line.userData.ring = ring;
            line.userData.target = targets[i];
            
            this.add(line);
            this.controlLines.push(line);
          });
        }

        /**
         * 设置控制器交互
         */
        setupControllerInteraction() {
          // 使用 xrblocks 提供的控制器数据，在 update() 中手动处理交互
          this.raycaster = new THREE.Raycaster();
          
          // 抓取状态
          this.grabbedRing = null;
          this.grabbingControllerIndex = null;
        }

        /**
         * 更新控制线
         */
        updateControlLines() {
          this.controlLines.forEach(line => {
            const ring = line.userData.ring;
            const target = line.userData.target;
            
            // 获取牵引环的世界坐标
            const ringWorld = new THREE.Vector3();
            ring.getWorldPosition(ringWorld);
            
            // 获取目标部位的世界坐标
            const targetWorld = new THREE.Vector3();
            target.getWorldPosition(targetWorld);
            
            // 更新线的顶点
            const positions = line.geometry.attributes.position.array;
            positions[0] = ringWorld.x;
            positions[1] = ringWorld.y;
            positions[2] = ringWorld.z;
            positions[3] = targetWorld.x;
            positions[4] = targetWorld.y;
            positions[5] = targetWorld.z;
            line.geometry.attributes.position.needsUpdate = true;
          });
        }

        /**
         * 根据牵引环位置更新木偶关节
         */
        updatePuppetJoints() {
          // 获取木偶中心位置
          const puppetPos = this.puppetGroup.position;
          
          // 头部
          const headRingPos = this.headRing.position;
          const headOffset = headRingPos.clone().sub(puppetPos).sub(new THREE.Vector3(0, 0.35, 0));
          this.headPivot.rotation.z = THREE.MathUtils.clamp(headOffset.x * 5, -0.8, 0.8);
          this.headPivot.rotation.x = THREE.MathUtils.clamp(-headOffset.z * 5, -0.8, 0.8);

          // 左手
          const leftHandRingPos = this.leftHandRing.position;
          const leftShoulderPos = puppetPos.clone().add(new THREE.Vector3(-0.08, 0.15, 0));
          const leftArmDir = leftHandRingPos.clone().sub(leftShoulderPos);
          const leftArmLen = leftArmDir.length();
          
          if (leftArmLen > 0.02) {
            leftArmDir.normalize();
            const pitch = Math.atan2(leftArmDir.y, Math.sqrt(leftArmDir.x * leftArmDir.x + leftArmDir.z * leftArmDir.z));
            const yaw = Math.atan2(-leftArmDir.x, -leftArmDir.z);
            this.leftShoulderPivot.rotation.set(pitch - Math.PI/2, yaw, 0, 'YXZ');
            this.leftElbowPivot.rotation.x = -Math.min(leftArmLen / 0.22, 1.2) * Math.PI * 0.35;
          }

          // 右手
          const rightHandRingPos = this.rightHandRing.position;
          const rightShoulderPos = puppetPos.clone().add(new THREE.Vector3(0.08, 0.15, 0));
          const rightArmDir = rightHandRingPos.clone().sub(rightShoulderPos);
          const rightArmLen = rightArmDir.length();
          
          if (rightArmLen > 0.02) {
            rightArmDir.normalize();
            const pitch = Math.atan2(rightArmDir.y, Math.sqrt(rightArmDir.x * rightArmDir.x + rightArmDir.z * rightArmDir.z));
            const yaw = Math.atan2(-rightArmDir.x, -rightArmDir.z);
            this.rightShoulderPivot.rotation.set(pitch - Math.PI/2, yaw, 0, 'YXZ');
            this.rightElbowPivot.rotation.x = -Math.min(rightArmLen / 0.22, 1.2) * Math.PI * 0.35;
          }

          // 左脚
          const leftFootRingPos = this.leftFootRing.position;
          const leftHipPos = puppetPos.clone().add(new THREE.Vector3(-0.04, 0.0, 0));
          const leftLegDir = leftFootRingPos.clone().sub(leftHipPos);
          const leftLegLen = leftLegDir.length();
          
          if (leftLegLen > 0.02) {
            leftLegDir.normalize();
            const pitch = Math.atan2(leftLegDir.y, Math.sqrt(leftLegDir.x * leftLegDir.x + leftLegDir.z * leftLegDir.z));
            const yaw = Math.atan2(-leftLegDir.x, -leftLegDir.z);
            this.leftHipPivot.rotation.set(pitch - Math.PI/2, yaw, 0, 'YXZ');
            this.leftKneePivot.rotation.x = Math.min(leftLegLen / 0.26, 1.0) * Math.PI * 0.25;
          }

          // 右脚
          const rightFootRingPos = this.rightFootRing.position;
          const rightHipPos = puppetPos.clone().add(new THREE.Vector3(0.04, 0.0, 0));
          const rightLegDir = rightFootRingPos.clone().sub(rightHipPos);
          const rightLegLen = rightLegDir.length();
          
          if (rightLegLen > 0.02) {
            rightLegDir.normalize();
            const pitch = Math.atan2(rightLegDir.y, Math.sqrt(rightLegDir.x * rightLegDir.x + rightLegDir.z * rightLegDir.z));
            const yaw = Math.atan2(-rightLegDir.x, -rightLegDir.z);
            this.rightHipPivot.rotation.set(pitch - Math.PI/2, yaw, 0, 'YXZ');
            this.rightKneePivot.rotation.x = Math.min(rightLegLen / 0.26, 1.0) * Math.PI * 0.25;
          }
        }

        /**
         * AI 交互
         */
        async askMonkey() {
          const ai = xb.core.ai;
          const camera = xb.core.deviceCamera;
          if (!ai || !ai.isAvailable()) {
            this.responseDisplay.setText('AI未就绪，请在环境中配置API Key。');
            return;
          }
          this.responseDisplay.setText('小猴子正在东张西望...');

          try {
            const parts = [];
            let sawSomething = false;

            if (camera) {
              try {
                const snapshot = camera.getSnapshot({outputFormat: 'base64'});
                if (snapshot) {
                  const {strippedBase64, mimeType} = xb.parseBase64DataURL(snapshot);
                  parts.push({inlineData: {mimeType: mimeType, data: strippedBase64}});
                  sawSomething = true;
                }
              } catch (e) {
                console.warn("无法获取相机画面", e);
              }
            }

            if (sawSomething) {
              parts.push({text: '你是一只调皮的木偶小猴子。请用幽默、可爱的语气（用"吱吱！"开头）用中文描述你在这张照片里看到了什么？如果没看到明显的物体，就随机讲个关于香蕉的冷笑话。控制在两句话以内。'});
            } else {
              parts.push({text: '你是一只调皮的木偶小猴子。因为当前设备未开放网页相机权限，你看不到外面。请用"吱吱！"开头，幽默地吐槽一下你被蒙住了眼睛，然后讲个关于香蕉的冷笑话。控制在两句话内。'});
            }

            const response = await ai.query({
              type: 'multiPart',
              parts: parts,
            });
            this.responseDisplay.setText(`🐒: ${response.text}`);
            
            this.isMonkeyTalking = true;
            this.talkStartTime = performance.now();
            setTimeout(() => { this.isMonkeyTalking = false; }, 4000);

          } catch (error) {
            this.responseDisplay.setText(`错误: ${error.message}`);
          }
        }

        /**
         * 渲染循环
         */
        update() {
          // 更新控制线和木偶关节
          this.updateControlLines();
          this.updatePuppetJoints();

          // 处理控制器交互
          this.handleControllerInteraction();

          // 说话动画
          if (this.isMonkeyTalking) {
            const time = (performance.now() - this.talkStartTime) / 100;
            const openRatio = (Math.sin(time) + 1) / 2;
            this.mouth.scale.set(1, 0.1 + (openRatio * 1.5), 1);
          } else {
            this.mouth.scale.set(1, 0.1, 1);
          }
        }

        /**
         * 处理控制器交互
         */
        handleControllerInteraction() {
          const controllers = xb.user.controllers;
          
          if (!controllers || !controllers.controllers) {
            return;
          }

          // 遍历所有控制器
          controllers.controllers.forEach((controller, index) => {
            if (!controller) return;

            // 获取手柄位置（使用 ray.origin 作为手柄位置）
            const controllerPos = new THREE.Vector3();
            if (controller.ray && controller.ray.origin) {
              controller.ray.origin.toArray(controllerPos);
            } else if (controller.position) {
              controllerPos.copy(controller.position);
            }

            // 获取扳机键状态
            const triggerPressed = controller.gamepad && 
                                   controller.gamepad.buttons && 
                                   controller.gamepad.buttons[0] && 
                                   controller.gamepad.buttons[0].pressed;

            if (triggerPressed) {
              // 如果还没抓取东西，尝试抓取
              if (!this.grabbedRing) {
                let nearestRing = null;
                let nearestDistance = 0.15;

                // 查找最近的牵引环
                this.ringsGroup.children.forEach(ring => {
                  const distance = controllerPos.distanceTo(ring.position);
                  if (distance < nearestDistance) {
                    nearestDistance = distance;
                    nearestRing = ring;
                  }
                });

                if (nearestRing) {
                  this.grabbedRing = nearestRing;
                  this.grabbingControllerIndex = index;
                  nearestRing.material.emissive.setHex(0x880000);
                  console.log('Grabbed ring:', nearestRing.userData.targetPart);
                }
              } else if (this.grabbingControllerIndex === index) {
                // 已抓取，更新牵引环位置 = 手柄位置
                this.grabbedRing.position.copy(controllerPos);
              }
            } else {
              // 释放抓取
              if (this.grabbedRing && this.grabbingControllerIndex === index) {
                this.grabbedRing.material.emissive.setHex(0x442200);
                console.log('Released ring');
                this.grabbedRing = null;
                this.grabbingControllerIndex = null;
              }
            }
          });
        }
      }

      async function start() {
        try {
          let hasVideoInput = false;
          if (navigator.mediaDevices && navigator.mediaDevices.enumerateDevices) {
            const devices = await navigator.mediaDevices.enumerateDevices();
            hasVideoInput = devices.some(device => device.kind === 'videoinput');
          }

          const options = new xb.Options();
          options.enableUI(); 
          options.enableAI();
          
          if (hasVideoInput) {
            options.enableCamera(); 
          }
          
          options.enableXRTransitions();
          options.enableVR();
          options.enableControllers();

          options.simulator.defaultMode = xb.SimulatorMode.POSE;
          
          xb.add(new PuppetMonkeyInteraction());
          await xb.init(options);
        } catch (error) {
          const logDiv = document.getElementById('debug-log');
          logDiv.style.display = 'block';
          logDiv.innerText = '初始化失败: ' + error.message + '\n\nStack: ' + (error.stack || '');
          console.error(error);
        }
      }

      document.addEventListener('DOMContentLoaded', start);
    </script>
  </body>
</html>

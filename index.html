<!doctype html>
<html lang="en">
  <head>
    <title>Monkey Puppet Controller Interaction | XR Blocks</title>

    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, user-scalable=no"
    />
    <link type="text/css" rel="stylesheet" href="https://xrblocks.github.io/css/xr.css" />
    <script>
      window.litDisableBundleWarning = true;
    </script>
    <script type="importmap">
      {
        "imports": {
          "three": "https://cdn.jsdelivr.net/npm/three@0.182.0/build/three.module.js",
          "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.182.0/examples/jsm/",
          "troika-three-text": "https://cdn.jsdelivr.net/gh/protectwise/troika@028b81cf308f0f22e5aa8e78196be56ec1997af5/packages/troika-three-text/src/index.js",
          "troika-three-utils": "https://cdn.jsdelivr.net/gh/protectwise/troika@v0.52.4/packages/troika-three-utils/src/index.js",
          "troika-worker-utils": "https://cdn.jsdelivr.net/gh/protectwise/troika@v0.52.4/packages/troika-worker-utils/src/index.js",
          "bidi-js": "https://esm.sh/bidi-js@%5E1.0.2?target=es2022",
          "webgl-sdf-generator": "https://esm.sh/webgl-sdf-generator@1.1.1/es2022/webgl-sdf-generator.mjs",
          "lit": "https://cdn.jsdelivr.net/gh/lit/dist@3/core/lit-core.min.js",
          "lit/": "https://esm.run/lit@3/",
          "xrblocks": "https://cdn.jsdelivr.net/npm/xrblocks@0.11.0/build/xrblocks.js",
          "xrblocks/addons/": "https://cdn.jsdelivr.net/npm/xrblocks@0.11.0/build/addons/",
          "@google/genai": "https://cdn.jsdelivr.net/npm/@google/genai/+esm"
        }
      }
    </script>
  </head>

  <body>
    <!-- 用于在头显中显示潜在错误信息的浮层 -->
    <div id="debug-log" style="position: absolute; top: 10px; left: 10px; color: red; z-index: 9999; font-weight: bold; background: rgba(255,255,255,0.8); padding: 5px; display: none;"></div>
    
    <script type="module">
      import 'xrblocks/addons/simulator/SimulatorAddons.js';
      import * as THREE from 'three';
      import * as xb from 'xrblocks';

      /**
       * PuppetMonkeyInteraction 演示了基于 VR 手柄控制器的牵线木偶交互。
       * 猴子模型是一个完整的牵线木偶，有灵活的关节（头、肩、肘、腕、膝、踝），
       * 玩家可以用手柄牵引木偶做各种动作。
       */
      class PuppetMonkeyInteraction extends xb.Script {
        init() {
          // 添加基础环境光照
          this.add(new THREE.HemisphereLight(0xffffff, 0x666666, 3));
          const dirLight = new THREE.DirectionalLight(0xffffff, 1.5);
          dirLight.position.set(1, 2, 1);
          this.add(dirLight);

          // 创建空间提示面板
          const panel = new xb.SpatialPanel({ backgroundColor: '#2b2b2baa' });
          panel.position.set(0, 1.5, -1.5);
          this.add(panel);

          const grid = panel.addGrid();
          grid.addRow({ weight: 0.5 }).addText({
            text: '🐒 牵线木偶小猴子！\n\n用手柄抓取牵引环\n牵引猴子做动作！\n\n按扳机键抓取/释放',
            fontColor: '#ffffff',
            fontSize: 0.05
          });

          // 新增：AI 交互区域
          const aiRow = grid.addRow({ weight: 0.25 });
          const aiButton = aiRow.addCol({ weight: 0.5 }).addTextButton({
            text: '✨ 让小猴子看看',
            fontColor: '#ffffff',
            backgroundColor: '#4285f4',
            fontSize: 0.05
          });
          aiButton.onTriggered = () => this.askMonkey();

          this.responseDisplay = grid.addRow({ weight: 0.25 }).addText({
            text: '点击上方按钮，小猴子会告诉你它看到了什么！',
            fontColor: '#ffeb3b',
            fontSize: 0.04
          });

          // 程序化生成牵线木偶猴子
          this.createPuppetMonkey();
          
          // 创建牵引控制器
          this.createPuppetController();
          
          // 控制状态
          this.grabbedRing = null;
          this.grabbingHand = null;
        }

        /**
         * 创建一个完整的牵线木偶猴子
         * 包含：头部、躯干、四肢（上臂、前臂、大腿、小腿）
         * 关节：颈部、肩部、肘部、腕部、臀部、膝部、踝部
         */
        createPuppetMonkey() {
          this.puppet = new THREE.Group();
          
          // 材质定义
          const brownMaterial = new THREE.MeshPhongMaterial({ color: 0x8B4513 });
          const lightBrownMaterial = new THREE.MeshPhongMaterial({ color: 0xD2B48C });
          const blackMaterial = new THREE.MeshPhongMaterial({ color: 0x000000 });
          const jointMaterial = new THREE.MeshPhongMaterial({ color: 0x654321 });

          // ==================== 头部 ====================
          this.headPivot = new THREE.Group(); // 颈部关节
          this.headPivot.position.set(0, 0.25, 0);
          
          const head = new THREE.Mesh(new THREE.SphereGeometry(0.08, 32, 32), brownMaterial);
          head.position.set(0, 0.08, 0);
          this.headPivot.add(head);

          // 嘴突部
          const snout = new THREE.Mesh(new THREE.SphereGeometry(0.045, 32, 32), lightBrownMaterial);
          snout.position.set(0, 0.05, 0.06);
          snout.scale.set(1, 0.7, 1.2);
          this.headPivot.add(snout);

          // 眼睛
          const eyeGeom = new THREE.SphereGeometry(0.012, 16, 16);
          const leftEye = new THREE.Mesh(eyeGeom, blackMaterial);
          leftEye.position.set(-0.03, 0.1, 0.06);
          this.headPivot.add(leftEye);
          const rightEye = new THREE.Mesh(eyeGeom, blackMaterial);
          rightEye.position.set(0.03, 0.1, 0.06);
          this.headPivot.add(rightEye);

          // 耳朵
          const earGeom = new THREE.SphereGeometry(0.03, 16, 16);
          const leftEar = new THREE.Mesh(earGeom, brownMaterial);
          leftEar.position.set(-0.08, 0.08, 0);
          leftEar.scale.set(0.5, 1, 1);
          this.headPivot.add(leftEar);
          const rightEar = new THREE.Mesh(earGeom, brownMaterial);
          rightEar.position.set(0.08, 0.08, 0);
          rightEar.scale.set(0.5, 1, 1);
          this.headPivot.add(rightEar);

          // 嘴巴（可动画）
          this.mouth = new THREE.Mesh(new THREE.SphereGeometry(0.02, 16, 16), blackMaterial);
          this.mouth.position.set(0, 0.04, 0.09);
          this.mouth.scale.set(1, 0.1, 1);
          this.headPivot.add(this.mouth);

          this.puppet.add(this.headPivot);

          // ==================== 躯干 ====================
          const torso = new THREE.Mesh(
            new THREE.CylinderGeometry(0.06, 0.07, 0.15, 16),
            brownMaterial
          );
          torso.position.set(0, 0.1, 0);
          this.puppet.add(torso);

          // ==================== 左臂 ====================
          // 左肩关节
          this.leftShoulderPivot = new THREE.Group();
          this.leftShoulderPivot.position.set(-0.08, 0.15, 0);
          
          // 左上臂
          const leftUpperArm = new THREE.Mesh(
            new THREE.CylinderGeometry(0.025, 0.02, 0.12, 12),
            brownMaterial
          );
          leftUpperArm.position.set(0, -0.06, 0);
          this.leftShoulderPivot.add(leftUpperArm);

          // 左肘关节
          this.leftElbowPivot = new THREE.Group();
          this.leftElbowPivot.position.set(0, -0.12, 0);
          
          // 左前臂
          const leftForearm = new THREE.Mesh(
            new THREE.CylinderGeometry(0.018, 0.015, 0.1, 12),
            brownMaterial
          );
          leftForearm.position.set(0, -0.05, 0);
          this.leftElbowPivot.add(leftForearm);

          // 左手腕关节
          this.leftWristPivot = new THREE.Group();
          this.leftWristPivot.position.set(0, -0.1, 0);
          
          // 左手掌
          const leftHand = new THREE.Mesh(new THREE.SphereGeometry(0.025, 12, 12), lightBrownMaterial);
          this.leftWristPivot.add(leftHand);
          
          this.leftElbowPivot.add(this.leftWristPivot);
          this.leftShoulderPivot.add(this.leftElbowPivot);
          this.puppet.add(this.leftShoulderPivot);

          // ==================== 右臂 ====================
          this.rightShoulderPivot = new THREE.Group();
          this.rightShoulderPivot.position.set(0.08, 0.15, 0);
          
          const rightUpperArm = new THREE.Mesh(
            new THREE.CylinderGeometry(0.025, 0.02, 0.12, 12),
            brownMaterial
          );
          rightUpperArm.position.set(0, -0.06, 0);
          this.rightShoulderPivot.add(rightUpperArm);

          this.rightElbowPivot = new THREE.Group();
          this.rightElbowPivot.position.set(0, -0.12, 0);
          
          const rightForearm = new THREE.Mesh(
            new THREE.CylinderGeometry(0.018, 0.015, 0.1, 12),
            brownMaterial
          );
          rightForearm.position.set(0, -0.05, 0);
          this.rightElbowPivot.add(rightForearm);

          this.rightWristPivot = new THREE.Group();
          this.rightWristPivot.position.set(0, -0.1, 0);
          
          const rightHand = new THREE.Mesh(new THREE.SphereGeometry(0.025, 12, 12), lightBrownMaterial);
          this.rightWristPivot.add(rightHand);
          
          this.rightElbowPivot.add(this.rightWristPivot);
          this.rightShoulderPivot.add(this.rightElbowPivot);
          this.puppet.add(this.rightShoulderPivot);

          // ==================== 左腿 ====================
          // 左臀关节
          this.leftHipPivot = new THREE.Group();
          this.leftHipPivot.position.set(-0.04, 0.0, 0);
          
          // 左大腿
          const leftThigh = new THREE.Mesh(
            new THREE.CylinderGeometry(0.03, 0.025, 0.14, 12),
            brownMaterial
          );
          leftThigh.position.set(0, -0.07, 0);
          this.leftHipPivot.add(leftThigh);

          // 左膝关节
          this.leftKneePivot = new THREE.Group();
          this.leftKneePivot.position.set(0, -0.14, 0);
          
          // 左小腿
          const leftCalf = new THREE.Mesh(
            new THREE.CylinderGeometry(0.02, 0.015, 0.12, 12),
            brownMaterial
          );
          leftCalf.position.set(0, -0.06, 0);
          this.leftKneePivot.add(leftCalf);

          // 左踝关节
          this.leftAnklePivot = new THREE.Group();
          this.leftAnklePivot.position.set(0, -0.12, 0);
          
          // 左脚
          const leftFoot = new THREE.Mesh(
            new THREE.BoxGeometry(0.03, 0.02, 0.06),
            brownMaterial
          );
          leftFoot.position.set(0, -0.01, 0.02);
          this.leftAnklePivot.add(leftFoot);
          
          this.leftKneePivot.add(this.leftAnklePivot);
          this.leftHipPivot.add(this.leftKneePivot);
          this.puppet.add(this.leftHipPivot);

          // ==================== 右腿 ====================
          this.rightHipPivot = new THREE.Group();
          this.rightHipPivot.position.set(0.04, 0.0, 0);
          
          const rightThigh = new THREE.Mesh(
            new THREE.CylinderGeometry(0.03, 0.025, 0.14, 12),
            brownMaterial
          );
          rightThigh.position.set(0, -0.07, 0);
          this.rightHipPivot.add(rightThigh);

          this.rightKneePivot = new THREE.Group();
          this.rightKneePivot.position.set(0, -0.14, 0);
          
          const rightCalf = new THREE.Mesh(
            new THREE.CylinderGeometry(0.02, 0.015, 0.12, 12),
            brownMaterial
          );
          rightCalf.position.set(0, -0.06, 0);
          this.rightKneePivot.add(rightCalf);

          this.rightAnklePivot = new THREE.Group();
          this.rightAnklePivot.position.set(0, -0.12, 0);
          
          const rightFoot = new THREE.Mesh(
            new THREE.BoxGeometry(0.03, 0.02, 0.06),
            brownMaterial
          );
          rightFoot.position.set(0, -0.01, 0.02);
          this.rightAnklePivot.add(rightFoot);
          
          this.rightKneePivot.add(this.rightAnklePivot);
          this.rightHipPivot.add(this.rightKneePivot);
          this.puppet.add(this.rightHipPivot);

          // 设置木偶初始位置
          this.puppet.position.set(0, 1.2, -1.0);
          this.add(this.puppet);
        }

        /**
         * 创建牵引控制器
         * 包括牵引环和控制线
         */
        createPuppetController() {
          // 牵引环材质
          const ringMaterial = new THREE.MeshPhongMaterial({ 
            color: 0xffd700,
            emissive: 0x442200,
            metalness: 0.8
          });
          
          // 控制线材质
          const lineMaterial = new THREE.LineBasicMaterial({ 
            color: 0xffffff,
            linewidth: 2
          });

          // 创建牵引环的函数
          const createRing = (radius = 0.04) => {
            const ringGeom = new THREE.TorusGeometry(radius, 0.005, 8, 32);
            const ring = new THREE.Mesh(ringGeom, ringMaterial);
            ring.userData.isGrabbable = true;
            return ring;
          };

          // ==================== 头部牵引环 ====================
          this.headRing = createRing();
          this.headRing.position.set(0, 1.6, -1.0);
          this.add(this.headRing);
          
          this.headLine = this.createControlLine(this.headRing, this.headPivot);
          this.add(this.headLine);

          // ==================== 左手牵引环 ====================
          this.leftHandRing = createRing();
          this.leftHandRing.position.set(-0.3, 1.4, -1.0);
          this.add(this.leftHandRing);
          
          this.leftHandLine = this.createControlLine(this.leftHandRing, this.leftWristPivot);
          this.add(this.leftHandLine);

          // ==================== 右手牵引环 ====================
          this.rightHandRing = createRing();
          this.rightHandRing.position.set(0.3, 1.4, -1.0);
          this.add(this.rightHandRing);
          
          this.rightHandLine = this.createControlLine(this.rightHandRing, this.rightWristPivot);
          this.add(this.rightHandLine);

          // ==================== 左脚牵引环 ====================
          this.leftFootRing = createRing();
          this.leftFootRing.position.set(-0.15, 0.8, -1.0);
          this.add(this.leftFootRing);
          
          this.leftFootLine = this.createControlLine(this.leftFootRing, this.leftAnklePivot);
          this.add(this.leftFootLine);

          // ==================== 右脚牵引环 ====================
          this.rightFootRing = createRing();
          this.rightFootRing.position.set(0.15, 0.8, -1.0);
          this.add(this.rightFootRing);
          
          this.rightFootLine = this.createControlLine(this.rightFootRing, this.rightAnklePivot);
          this.add(this.rightFootLine);

          // 存储所有牵引环
          this.controlRings = [
            this.headRing,
            this.leftHandRing,
            this.rightHandRing,
            this.leftFootRing,
            this.rightFootRing
          ];
        }

        /**
         * 创建控制线（连接牵引环和木偶部位）
         */
        createControlLine(ring, targetPart) {
          const geometry = new THREE.BufferGeometry();
          const positions = new Float32Array(6); // 2个点，每个点3个坐标
          geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
          
          const line = new THREE.Line(geometry, new THREE.LineBasicMaterial({ 
            color: 0xffffff,
            transparent: true,
            opacity: 0.6
          }));
          
          line.userData.ring = ring;
          line.userData.targetPart = targetPart;
          
          return line;
        }

        /**
         * 调用 Gemini API 获取视觉分析
         */
        async askMonkey() {
          const ai = xb.core.ai;
          const camera = xb.core.deviceCamera;
          if (!ai || !ai.isAvailable()) {
            this.responseDisplay.setText('AI未就绪，请在环境中配置API Key。');
            return;
          }
          this.responseDisplay.setText('小猴子正在东张西望...');

          try {
            const parts = [];
            let sawSomething = false;

            if (camera) {
              try {
                const snapshot = camera.getSnapshot({outputFormat: 'base64'});
                if (snapshot) {
                  const {strippedBase64, mimeType} = xb.parseBase64DataURL(snapshot);
                  parts.push({inlineData: {mimeType: mimeType, data: strippedBase64}});
                  sawSomething = true;
                }
              } catch (e) {
                console.warn("无法获取相机画面", e);
              }
            }

            if (sawSomething) {
              parts.push({text: '你是一只调皮的木偶小猴子。请用幽默、可爱的语气（用"吱吱！"开头）用中文描述你在这张照片里看到了什么？如果没看到明显的物体，就随机讲个关于香蕉的冷笑话。控制在两句话以内。'});
            } else {
              parts.push({text: '你是一只调皮的木偶小猴子。因为当前设备未开放网页相机权限，你看不到外面。请用"吱吱！"开头，幽默地吐槽一下你被蒙住了眼睛，然后讲个关于香蕉的冷笑话。控制在两句话内。'});
            }

            const response = await ai.query({
              type: 'multiPart',
              parts: parts,
            });
            this.responseDisplay.setText(`🐒: ${response.text}`);
            
            // 触发猴子自动张嘴说话的动画效果
            this.isMonkeyTalking = true;
            this.talkStartTime = performance.now();
            setTimeout(() => { this.isMonkeyTalking = false; }, 4000);

          } catch (error) {
            this.responseDisplay.setText(`错误: ${error.message}`);
          }
        }

        /**
         * 更新控制线位置
         */
        updateControlLine(line) {
          const ring = line.userData.ring;
          const targetPart = line.userData.targetPart;
          
          // 获取牵引环的世界坐标
          const ringWorldPos = new THREE.Vector3();
          ring.getWorldPosition(ringWorldPos);
          
          // 获取目标部位的世界坐标
          const targetWorldPos = new THREE.Vector3();
          targetPart.getWorldPosition(targetWorldPos);
          
          // 更新线的顶点
          const positions = line.geometry.attributes.position.array;
          positions[0] = ringWorldPos.x;
          positions[1] = ringWorldPos.y;
          positions[2] = ringWorldPos.z;
          positions[3] = targetWorldPos.x;
          positions[4] = targetWorldPos.y;
          positions[5] = targetWorldPos.z;
          line.geometry.attributes.position.needsUpdate = true;
        }

        /**
         * 根据牵引环位置更新木偶关节
         */
        updatePuppetJoints() {
          // 头部：跟随头部牵引环
          const headRingWorld = new THREE.Vector3();
          this.headRing.getWorldPosition(headRingWorld);
          const headTarget = new THREE.Vector3();
          this.headPivot.getWorldPosition(headTarget);
          
          // 计算头部应该朝向的方向
          const headDir = headRingWorld.clone().sub(headTarget).normalize();
          if (headDir.length() > 0.01) {
            // 简单的朝向控制
            this.headPivot.lookAt(headRingWorld);
          }

          // 左手：牵引环移动时，手臂跟随
          const leftHandWorld = new THREE.Vector3();
          this.leftHandRing.getWorldPosition(leftHandWorld);
          this.updateArmIK(this.leftShoulderPivot, this.leftElbowPivot, this.leftWristPivot, leftHandWorld);

          // 右手
          const rightHandWorld = new THREE.Vector3();
          this.rightHandRing.getWorldPosition(rightHandWorld);
          this.updateArmIK(this.rightShoulderPivot, this.rightElbowPivot, this.rightWristPivot, rightHandWorld);

          // 左脚
          const leftFootWorld = new THREE.Vector3();
          this.leftFootRing.getWorldPosition(leftFootWorld);
          this.updateLegIK(this.leftHipPivot, this.leftKneePivot, this.leftAnklePivot, leftFootWorld);

          // 右脚
          const rightFootWorld = new THREE.Vector3();
          this.rightFootRing.getWorldPosition(rightFootWorld);
          this.updateLegIK(this.rightHipPivot, this.rightKneePivot, this.rightAnklePivot, rightFootWorld);
        }

        /**
         * 简化的手臂IK（逆向运动学）
         */
        updateArmIK(shoulder, elbow, wrist, targetPos) {
          const shoulderWorld = new THREE.Vector3();
          shoulder.getWorldPosition(shoulderWorld);
          
          // 计算从肩膀到目标的方向
          const dir = targetPos.clone().sub(shoulderWorld);
          const distance = dir.length();
          
          if (distance > 0.05) {
            // 让肩膀朝向目标
            shoulder.lookAt(targetPos);
            shoulder.rotateX(Math.PI / 2);
            
            // 根据距离调整肘部弯曲
            const maxReach = 0.22; // 上臂+前臂长度
            const bendRatio = Math.min(1, distance / maxReach);
            elbow.rotation.x = -bendRatio * Math.PI * 0.5;
          }
        }

        /**
         * 简化的腿部IK
         */
        updateLegIK(hip, knee, ankle, targetPos) {
          const hipWorld = new THREE.Vector3();
          hip.getWorldPosition(hipWorld);
          
          const dir = targetPos.clone().sub(hipWorld);
          const distance = dir.length();
          
          if (distance > 0.05) {
            hip.lookAt(targetPos);
            hip.rotateX(Math.PI / 2);
            
            const maxReach = 0.26;
            const bendRatio = Math.min(1, distance / maxReach);
            knee.rotation.x = bendRatio * Math.PI * 0.3;
          }
        }

        /**
         * 渲染循环：处理手柄交互和木偶动画
         */
        update() {
          // 更新控制线
          this.updateControlLine(this.headLine);
          this.updateControlLine(this.leftHandLine);
          this.updateControlLine(this.rightHandLine);
          this.updateControlLine(this.leftFootLine);
          this.updateControlLine(this.rightFootLine);

          // 更新木偶关节
          this.updatePuppetJoints();

          // 处理手柄交互
          this.handleControllerInteraction();

          // 处理说话动画
          if (this.isMonkeyTalking) {
            const time = (performance.now() - this.talkStartTime) / 100;
            const openRatio = (Math.sin(time) + 1) / 2;
            this.mouth.scale.set(1, 0.1 + (openRatio * 1.5), 1);
          } else {
            this.mouth.scale.set(1, 0.1, 1);
          }
        }

        /**
         * 处理手柄抓取交互
         */
        handleControllerInteraction() {
          const controllers = xb.user.controllers;
          
          if (!controllers || !controllers.controllers) {
            return;
          }

          controllers.controllers.forEach((controller, index) => {
            if (!controller || !controller.gamepad) return;

            const gamepad = controller.gamepad;
            const triggerPressed = gamepad.buttons[0] && gamepad.buttons[0].pressed;

            // 获取手柄的世界位置
            const controllerPos = new THREE.Vector3();
            if (controller.ray) {
              controller.ray.origin.toArray(controllerPos);
            }

            if (triggerPressed) {
              // 如果还没抓取东西，尝试抓取
              if (!this.grabbedRing) {
                // 查找最近的牵引环
                let nearestRing = null;
                let nearestDistance = 0.15; // 抓取距离阈值

                this.controlRings.forEach(ring => {
                  const ringPos = new THREE.Vector3();
                  ring.getWorldPosition(ringPos);
                  const distance = controllerPos.distanceTo(ringPos);
                  
                  if (distance < nearestDistance) {
                    nearestDistance = distance;
                    nearestRing = ring;
                  }
                });

                if (nearestRing) {
                  this.grabbedRing = nearestRing;
                  this.grabbingHand = index;
                  nearestRing.material.emissive.setHex(0x880000);
                }
              } else if (this.grabbingHand === index) {
                // 已抓取，更新牵引环位置
                this.grabbedRing.position.copy(controllerPos);
              }
            } else {
              // 释放抓取
              if (this.grabbedRing && this.grabbingHand === index) {
                this.grabbedRing.material.emissive.setHex(0x442200);
                this.grabbedRing = null;
                this.grabbingHand = null;
              }
            }
          });
        }
      }

      async function start() {
        try {
          // 在初始化前，先检测设备是否有可用的摄像头硬件
          let hasVideoInput = false;
          if (navigator.mediaDevices && navigator.mediaDevices.enumerateDevices) {
            const devices = await navigator.mediaDevices.enumerateDevices();
            hasVideoInput = devices.some(device => device.kind === 'videoinput');
          }

          const options = new xb.Options();
          
          // 必须开启 UI 模块，SpatialPanel 才能正常工作
          options.enableUI(); 

          // 启用 AI
          options.enableAI();
          
          // 仅在检测到物理摄像头时开启相机模块
          if (hasVideoInput) {
            options.enableCamera(); 
          }
          
          // 启用 XR Transitions 以提供 "Enter VR" 入口
          options.enableXRTransitions();

          // 设置 VR 模式
          options.enableVR();

          // 启用手柄控制器（而不是手势追踪）
          options.enableControllers();
          options.controllers.enabled = true;
          options.controllers.visualization = true;

          options.simulator.defaultMode = xb.SimulatorMode.POSE;
          
          xb.add(new PuppetMonkeyInteraction());
          await xb.init(options);
        } catch (error) {
          // 如果失败，会在屏幕左上角打印红色错误信息
          const logDiv = document.getElementById('debug-log');
          logDiv.style.display = 'block';
          logDiv.innerText = '初始化失败: ' + error.message + '\n\nStack: ' + (error.stack || '');
          console.error(error);
        }
      }

      document.addEventListener('DOMContentLoaded', start);
    </script>
  </body>
</html>
